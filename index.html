<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management App</title>
    <link rel="stylesheet" href="styles.css">
    <script defer src="app.js"></script>
  </head>
  <body>
    <h1>Task Management App</h1>
    <div id="CurrentDate">Current Date : </div>

    <div id="InputSection" class="">
      <table id="InputTable" border=0>
        <body>
          <tr>
            <td>Task Name </td>
            <td>              
              <input id="tasknameInput" type="text" placeholder="Enter an Task Name:" />
            </td>
          </tr>
          <tr>
            <td> Category </td>
            <td>              
              <input id="categoryInput" type="text" placeholder="Enter Category:" />
            </td>
          </tr>
          <tr>
            <td> Deadline Date </td>
            <td>              
              <input id="deadlineInput" type="date" placeholder="Enter an Deadline" value="current"/>
            </td>
          </tr>
          <tr>
            <td> Initial Status </td>
            <td>              
              <select name = "status" id = "status-select">                
                <option value = "In Progress">In Progress</option>
                <option value = "Completed">Completed</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>
              <button id="addTaskButton">Add Task</button>
            </td>
            <td id="ErrorMessage">
              Please enter required fields!
            </td>
          </tr>
        </body>

      </table>
    </div>
    <br>
    <br>
    <div>
      Filter:
      <select name = "filterstatus" id = "filterstatus-select">                
        <option value = "In Progress">In Progress</option>
        <option value = "Completed">Completed</option>
      </select>

    </div>
    <div id="TaskSection">
      <ul id="task"></ul>
      <table id="TaskTable" border="1">
        <thead>
          <tr>
            <th>Task Name</th>
            <th>Category</th>
            <th>Deadline date</th>
            <th>Current Status</th>
            <th></th>
          </tr>
        </head>
        <tbody id="TaskBody">

        </body>
      </table>
    </div>
    <div id = "ChangeStatusDialog" class="ChangeStatusDialog">
      
      <div class="modal-box">
        Pick a status.
        <select name = "status" id = "newstatus-select">                
          <option value = "In Progress">In Progress</option>
          <option value = "Completed">Completed</option>
        </select>
        <button id="submitBtn" class="modal-close" data-indexnumber="-1">Submit</button>
        <button id="cancelBtn" class="modal-close">Cancel</button>
      </div>
      
    </div>
  </body>
</html>
